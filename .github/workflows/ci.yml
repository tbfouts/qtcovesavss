name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6.10.0
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.0'
          modules: 'qtgrpc qtremoteobjects'
          cache: true

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build python3-venv

      - name: Cache Qt source-built modules
        id: cache-qt-modules
        uses: actions/cache@v4
        with:
          path: |
            qt-build/qtmqtt
            qt-build/qtinterfaceframework
          key: qt-src-modules-${{ runner.os }}-6.10.0-v1

      - name: Build qtmqtt from source
        if: steps.cache-qt-modules.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v6.10.0 https://code.qt.io/qt/qtmqtt.git /tmp/qtmqtt
          qt-cmake -S /tmp/qtmqtt -B qt-build/qtmqtt -G Ninja
          cmake --build qt-build/qtmqtt --parallel

      - name: Install qtmqtt
        run: cmake --install qt-build/qtmqtt

      - name: Build qtinterfaceframework from source
        if: steps.cache-qt-modules.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v6.10.0 --recurse-submodules https://code.qt.io/qt/qtinterfaceframework.git /tmp/qtinterfaceframework
          qt-cmake -S /tmp/qtinterfaceframework -B qt-build/qtinterfaceframework -G Ninja
          cmake --build qt-build/qtinterfaceframework --parallel

      - name: Install qtinterfaceframework
        run: cmake --install qt-build/qtinterfaceframework

      - name: Configure
        run: qt-cmake -S . -B build -G Ninja -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure
        env:
          QT_QPA_PLATFORM: offscreen
